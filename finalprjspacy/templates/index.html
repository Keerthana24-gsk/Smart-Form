<!DOCTYPE html>
<html>
<head>
    <title>Smart Form</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            color: #777;
            margin-bottom: 25px;
        }

        input {
            width: 90%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Smart Form</h1>
    <p>AI Voice-Based Form Assistant</p>

    <form action="/start" method="post">
        <input type="text" name="url" placeholder="Enter Google Form Link" required>
        <br>
        <button type="submit">Start Assistant</button>
    </form>

    <div class="footer">
        Powered by AI Voice Automation
    </div>
</div>

<script>
    window.onload = function() {
        let msg = new SpeechSynthesisUtterance("Welcome to Smart Form. AI voice assistant is ready.");
        speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
